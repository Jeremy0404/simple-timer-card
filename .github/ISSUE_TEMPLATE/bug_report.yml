name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: input
    id: card-version
    attributes:
      label: Card version
      placeholder: e.g. v0.2.0
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.5.0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Card YAML
      description: The card configuration you're using.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Browser console errors
      description: Any errors from the browser DevTools console.
      render: shell
